[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for API
[[redirects]]
  from = "/api/auth/validate"
  to = "/.netlify/functions/auth-validate"
  status = 200

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/content/draft"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/content/publish"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/assets/upload"
  to = "/.netlify/functions/assets-upload"
  status = 200

[[redirects]]
  from = "/api/deploy"
  to = "/.netlify/functions/deploy"
  status = 200

# SPA fallback - redirect to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Identity settings
[identity]
  enabled = true
